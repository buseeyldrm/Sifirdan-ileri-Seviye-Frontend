<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="header">
      <div class="search-input">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          placeholder="Find the Game or Character that interests you"
        />
      </div>

      <button class="filter-button">
        <i class="fa-solid fa-filter"></i>
        <span class="text">Filter</span>
        <span class="count">2</span>
      </button>
    </header>
    <main>
      <div class="main-box">
        <div class="player-img">
          <img src="./image/player.png" alt="" />
        </div>
        <div class="player-info">
          <div class="player-name">
            <h2>TOP PLAYERS</h2>

            <div class="player-storm">
              <h1>STORM</h1>
              <h3>PLAYED 235H 23M</h3>
            </div>
          </div>

          <div class="player-statistic">
            <p class="title">Player Statistic</p>

            <div class="statistic-info">
              <div class="box">
                <span>Win Ratio</span>
                <strong>72.11%</strong>
              </div>
              <div class="box">
                <span>K / D Ratio</span>
                <strong>2.34</strong>
              </div>

              <div class="box">
                <span>Dmg / Round</span>
                <strong>156.4</strong>
              </div>
            </div>
            <div class="player-ability">
              <p class="title">Ability / Match</p>

              <div class="player-box-container">
                <div class="player-box">
                  <i class="fa-solid fa-fire-flame-curved"></i>
                  <p>2.38</p>
                </div>
                <div class="player-box">
                  <i class="fa-solid fa-khanda"></i>
                  <p>1.38</p>
                </div>
                <div class="player-box">
                  <i class="fa-solid fa-hurricane"></i>
                  <p>8.38</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <section>
      <div class="box-end">
        <div class="weapons">
          <div class="weapons-header">
            <p class="weapons-title">Weapons</p>

            <button class="weapons-select">
              All Weapons
              <i class="fa-solid fa-angle-down"></i>
            </button>
          </div>

          <div class="weapons-card">
            <img src="./image/weapon.png" alt="Spectre" />

            <p class="weapon-name">SPECTRE</p>
            <p class="weapon-desc">Assault Rivals Sniper</p>
          </div>
        </div>

        <div class="power-ability">
          <h1>Power Ability</h1>
          <img src="./image/fire.png" alt="" />
          <p class="power-title">FIRE SPRINKLE</p>
          <p class="power-desc">Bestattack from the players in game</p>
        </div>
      </div>
    </section>
  </body>
</html>
